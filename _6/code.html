<main class="pt-24 pb-32 px-6 max-w-5xl mx-auto">

<h1 class="font-headline text-5xl md:text-7xl font-black tracking-tighter uppercase leading-none">选择你的 <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-fixed to-secondary">动能</span></h1>
</section>
<!-- Workout Grid -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-6">
<!-- Hypertrophy - Featured Card -->
<div class="md:col-span-8 group relative overflow-hidden rounded-xl bg-surface-container-low h-[400px]">

<div class="absolute bottom-0 p-8 w-full">
<div class="flex justify-between items-end">
<div>
<span class="inline-block px-3 py-1 rounded-full bg-primary-fixed text-on-primary-fixed text-[10px] font-black uppercase tracking-widest mb-4">热门推荐</span>
<h2 class="font-headline text-4xl font-extrabold uppercase tracking-tight mb-2">增肌训练</h2>
<div class="flex gap-4 text-on-surface-variant text-sm"><span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span> 65 分钟</span><span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm" data-icon="bolt">bolt</span> 进阶</span></div>
</div>
<span class="material-symbols-outlined text-primary-fixed text-4xl opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</div>
</div>
</div>
<!-- Strength Card -->
<div class="md:col-span-4 group relative overflow-hidden rounded-xl bg-surface-container-high h-[400px]">
<img class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-105 transition-transform duration-700" data-alt="dramatic wide shot of a heavy barbell on a squat rack in a dark moody gym with single overhead spotlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEN8xcAx-k-r_wIaAYW-XW23p-JUw3s-hDlZTyzSuF9f1d_GFuJX9DBph0jqfIAzoWbO6tdxHnVVLGQMYpyZirlDFRuwqlP3rhTpbAg8n9RwdmQcI3fnvDwfNqOtEllOz3pAVBeCvtEk3OmBtJ76zBlDB0t6E9s8vXaDq3GvAC0GdpIcBj-g9UrqhS4JSGKdksQrfgwIb3uWnV0QOwdhKltBH3kBG1O-d2UKIU-vbUJmrnyZABw3kO1gugs1mZWx20Nm3G-_CAshJN"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent"></div>
<div class="absolute bottom-0 p-8">

<div class="flex flex-col gap-1 text-on-surface-variant text-sm"><span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span> 45 分钟</span><span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm" data-icon="fitness_center">fitness_center</span> 力量举</span></div>
</div>
</div>
<!-- Cardio / Metabolic -->

<div class="flex justify-between">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="speed">speed</span>
<span class="text-on-surface-variant font-black text-xs tracking-widest">代谢提升</span>
</div>
<div>
<h2 class="font-headline text-3xl font-extrabold uppercase tracking-tight mb-1">代谢提升</h2>
<p class="text-on-surface-variant text-sm">30 分钟 • 高强度</p>
</div>
</div>
</div>
<!-- Recovery / Mobility -->
<div class="md:col-span-6 group relative overflow-hidden rounded-xl bg-surface-container-highest h-[300px]">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,_rgba(204,255,0,0.1)_0%,_transparent_70%)]"></div>
<div class="relative z-10 p-8 flex flex-col h-full justify-between border border-white/5">
<div class="flex justify-between">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="self_care">self_care</span>
<span class="text-on-surface-variant font-black text-xs tracking-widest">恢复</span>
</div>
<div>
<h2 class="font-headline text-3xl font-extrabold uppercase tracking-tight mb-1">灵活性训练</h2>
<p class="text-on-surface-variant text-sm">20 分钟 • 流动状态</p>
</div>
</div>
</div>
</div>

<section class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="glass-card p-6 rounded-lg flex items-center gap-4">

<span class="material-symbols-outlined text-primary-fixed" data-icon="battery_very_high">battery_very_low</span>

</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-white/5 bg-[#131313]/90 backdrop-blur-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] z-50 flex justify-around items-center px-4 py-2">
<button class="bg-[#CCFF00] text-black rounded-full p-3 shadow-[0_0_15px_rgba(204,255,0,0.4)] active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</button>
<button class="text-neutral-500 p-3 hover:text-white transition-colors active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>

<button class="text-neutral-500 p-3 hover:text-white transition-colors active:scale-90 duration-300 ease-out">

<button class="text-neutral-500 p-3 hover:text-white transition-colors active:scale-90 duration-300 ease-out">

<button class="text-neutral-500 p-3 hover:text-white transition-colors active:scale-90 duration-300 ease-out">
